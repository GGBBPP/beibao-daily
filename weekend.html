<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周末干什么 - 贝宝日常</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #E8F4FD 0%, #D4E8F9 50%, #C5DFF0 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  position: relative;
}

.float-deco {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  animation-timing-function: ease-in-out;
  animation-iteration-count: infinite;
}

@keyframes decoFloat1 {
  0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
  25% { transform: translate(15px, -25px) rotate(8deg) scale(1.1); }
  50% { transform: translate(-10px, -40px) rotate(-5deg) scale(0.95); }
  75% { transform: translate(20px, -15px) rotate(12deg) scale(1.05); }
}

@keyframes decoFloat2 {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(-20px, -20px) rotate(-10deg); }
  66% { transform: translate(12px, -30px) rotate(6deg); }
}

@keyframes decoFloat3 {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  50% { transform: translate(0, -35px) rotate(15deg); }
}

@keyframes twinkle {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}

.top-bar {
  width: 100%;
  max-width: 480px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  position: relative;
  z-index: 10;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.8);
  border: none;
  color: #5B8CB8;
  font-size: 15px;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.back-btn:hover { background: white; transform: scale(1.05); }
.back-btn:active { transform: scale(0.95); }

.page-title {
  font-size: 20px;
  font-weight: 700;
  color: #4A7BA7;
  letter-spacing: 2px;
}

.container {
  max-width: 480px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 24px 60px;
  position: relative;
  z-index: 1;
}

.wheel-container {
  position: relative;
  width: 360px;
  height: 360px;
  margin: 20px auto;
}

canvas {
  width: 360px;
  height: 360px;
  border-radius: 50%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.1);
}

.pointer {
  position: absolute;
  top: -18px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 18px solid transparent;
  border-right: 18px solid transparent;
  border-top: 32px solid #FF6B6B;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  z-index: 5;
}

.center-dot {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 44px;
  height: 44px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  z-index: 4;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.spin-btn {
  margin-top: 28px;
  padding: 16px 60px;
  font-size: 20px;
  font-weight: 700;
  color: white;
  background: linear-gradient(135deg, #5B8CB8, #7DB8E8);
  border: none;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 6px 24px rgba(91,140,184,0.3);
  letter-spacing: 3px;
}

.spin-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(91,140,184,0.4); }
.spin-btn:active { transform: scale(0.95); }
.spin-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* ====== 游戏选择弹窗 ====== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.25s ease-out;
}

.modal-overlay.show { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.game-picker {
  background: white;
  border-radius: 28px;
  padding: 32px 28px 28px;
  text-align: center;
  width: 300px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.15);
  animation: popIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes popIn {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.game-picker h2 {
  font-size: 20px;
  color: #4A7BA7;
  margin-bottom: 4px;
}

.game-picker .hint {
  font-size: 13px;
  color: #A0A0A0;
  margin-bottom: 20px;
}

.game-display {
  width: 160px;
  height: 160px;
  margin: 0 auto 20px;
  background: linear-gradient(135deg, #F0F8FF, #E8F0FF);
  border-radius: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.2s;
}

.game-display.rolling-g {
  animation: shake 0.12s ease-in-out infinite;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-3px); }
  75% { transform: translateX(3px); }
}

.game-emoji {
  font-size: 56px;
  line-height: 1;
}

.game-name {
  font-size: 18px;
  font-weight: 700;
  color: #4A4A4A;
}

.game-countdown {
  font-size: 40px;
  font-weight: 800;
  color: #FF8E53;
  animation: pulse 0.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

.game-pick-btn {
  padding: 12px 40px;
  font-size: 17px;
  font-weight: 700;
  color: white;
  background: linear-gradient(135deg, #5B8CB8, #7DB8E8);
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(91,140,184,0.3);
  letter-spacing: 2px;
}

.game-pick-btn:hover { transform: scale(1.04); }
.game-pick-btn:active { transform: scale(0.95); }
.game-pick-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.game-close-btn {
  margin-top: 12px;
  background: none;
  border: none;
  color: #B0B0B0;
  font-size: 14px;
  cursor: pointer;
  padding: 8px 16px;
  transition: color 0.2s;
}

.game-close-btn:hover { color: #888; }

/* ====== 编辑区域 ====== */
.edit-section {
  margin-top: 28px;
  width: 100%;
  background: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}

.game-edit-section {
  margin-top: 16px;
  width: 100%;
  background: white;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
}

.edit-section h3, .game-edit-section h3 {
  font-size: 15px;
  color: #888;
  margin-bottom: 12px;
  letter-spacing: 2px;
}

.item-list, .game-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}

.item-tag, .game-tag {
  display: flex;
  align-items: center;
  gap: 4px;
  background: #F0F8FF;
  padding: 6px 12px;
  border-radius: 16px;
  font-size: 14px;
  color: #4A7BA7;
}

.game-tag { background: #FFF0F0; color: #D48460; }

.item-tag button, .game-tag button {
  background: none;
  border: none;
  color: #C0C0C0;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 0 2px;
  transition: color 0.2s;
}

.item-tag button:hover, .game-tag button:hover { color: #FF6B6B; }

.add-row {
  display: flex;
  gap: 8px;
}

.add-row input {
  flex: 1;
  padding: 10px 14px;
  border: 2px solid #E8F0F8;
  border-radius: 16px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.add-row input:focus { border-color: #5B8CB8; }

.add-row button {
  padding: 10px 18px;
  background: linear-gradient(135deg, #5B8CB8, #7DB8E8);
  color: white;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: all 0.2s;
}

.game-edit-section .add-row button {
  background: linear-gradient(135deg, #FF8E53, #FF6B6B);
}

.add-row button:hover { opacity: 0.9; }

.footer-hint {
  margin-top: 12px;
  font-size: 12px;
  color: #A0B8D0;
  letter-spacing: 1px;
}

.game-edit-section .footer-hint { color: #C0A090; }

.steam-config {
  background: #FFF8F5;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}

.steam-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.steam-row input {
  flex: 1;
  padding: 8px 12px;
  border: 2px solid #F0E0D8;
  border-radius: 12px;
  font-size: 13px;
  outline: none;
  background: white;
}

.steam-row input:focus { border-color: #FF8E53; }

.steam-sync-btn {
  width: 100%;
  padding: 10px;
  font-size: 15px;
  font-weight: 700;
  color: white;
  background: linear-gradient(135deg, #2A475E, #1B2838);
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 2px;
}

.steam-sync-btn:hover { opacity: 0.9; transform: scale(1.02); }
.steam-sync-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.steam-hint {
  margin-top: 8px;
  font-size: 12px;
  text-align: center;
}

.steam-hint a { color: #5B8CB8; text-decoration: none; }
.steam-hint a:hover { text-decoration: underline; }

.steam-status {
  margin-top: 6px;
  font-size: 12px;
  text-align: center;
  color: #888;
  min-height: 16px;
}

.steam-status.success { color: #4CAF50; }
.steam-status.error { color: #FF6B6B; }
.steam-status.loading { color: #FF8E53; }
</style>
</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="window.location.href='index.html'">
    <span>←</span> 返回
  </button>
  <span class="page-title">🎡 周末干什么</span>
</div>

<div class="container">
  <div class="wheel-container">
    <div class="pointer"></div>
    <canvas id="wheelCanvas" width="760" height="760"></canvas>
    <div class="center-dot">🎯</div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spin()">✨ 转动转盘 ✨</button>

  <!-- 转盘内容编辑 -->
  <div class="edit-section">
    <h3>⚙️ 自定义转盘内容</h3>
    <div class="item-list" id="itemList"></div>
    <div class="add-row">
      <input type="text" id="newItemInput" placeholder="输入新选项…" maxlength="10">
      <button onclick="addItem()">＋ 添加</button>
    </div>
    <p class="footer-hint">最少 2 项，最多 12 项</p>
  </div>

  <!-- Steam 游戏库编辑 -->
  <div class="game-edit-section">
    <h3>🎮 Steam 游戏库（抽到游戏时从这里选）</h3>
    <div class="steam-config">
      <div class="steam-row">
        <input type="text" id="steamIdInput" placeholder="Steam ID (17位数字)" value="76561198264403185">
        <input type="text" id="steamKeyInput" placeholder="Steam Web API Key" value="ABAADDACCCE7DCC756A7CCB2E7EE586A">
      </div>
      <button class="steam-sync-btn" id="steamSyncBtn" onclick="syncSteamGames()">🔄 同步 Steam 游戏库</button>
      <p class="steam-hint">
        <a href="https://steamcommunity.com/dev/apikey" target="_blank" rel="noopener">获取 API Key →</a>
        &nbsp;|&nbsp;
        <a href="https://steamid.io/" target="_blank" rel="noopener">查找 Steam ID →</a>
      </p>
      <p class="steam-status" id="steamStatus"></p>
    </div>
    <div class="game-list" id="gameList"></div>
    <div class="add-row">
      <input type="text" id="newGameInput" placeholder="手动添加游戏…" maxlength="24">
      <button onclick="addGame()">＋ 添加</button>
    </div>
    <p class="footer-hint">可手动添加或点「同步」从 Steam 自动拉取</p>
  </div>
</div>

<!-- 游戏选择弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="game-picker">
    <h2>🎮 今天玩什么？</h2>
    <p class="hint">从你的 Steam 库里挑一个</p>
    <div class="game-display" id="gameDisplay">
      <span class="game-emoji" id="gameEmoji">🎲</span>
      <span class="game-name" id="gameName">点击下方按钮</span>
    </div>
    <button class="game-pick-btn" id="gamePickBtn" onclick="gamePick()">🎲 随机挑一款</button>
    <br>
    <button class="game-close-btn" onclick="closeGameModal()">先不玩了，关掉</button>
  </div>
</div>

<script>
// ====== 漂浮装饰 ======
(function createDecorations() {
  const decos = ["⭐","🌟","💫","✨","☁️","🌈","💖","🌸","🎀","🦋","🍀","💎","🌙","☀️","🐱","🐶","🐰","🐻","🎈","🎵","🍭","🧸"];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement("span");
    el.className = "float-deco";
    el.textContent = decos[Math.floor(Math.random() * decos.length)];
    el.style.left = Math.random() * 95 + "%";
    el.style.top = Math.random() * 90 + "%";
    el.style.fontSize = (22 + Math.random() * 24) + "px";
    el.style.opacity = (0.25 + Math.random() * 0.35);
    el.style.animationName = ["decoFloat1","decoFloat2","decoFloat3","twinkle"][i % 4];
    el.style.animationDuration = (6 + Math.random() * 12) + "s";
    el.style.animationDelay = Math.random() * 8 + "s";
    document.body.appendChild(el);
  }
})();

const DEFAULT_ITEMS = ["看电影 🎬", "逛街 🛍️", "宅家休息 🏠", "做运动 🏃", "读本书 📖", "约饭局 🍲", "郊游踏青 🌿", "打游戏 🎮"];
const GAME_EMOJIS = ["🎮","🕹️","🎲","🃏","👾","🎯","🏆","🔫","⚔️","🧩"];

let items = [];
let isSpinning = false;
let wheelAngle = 0;

const COLORS = [
  "#FF9AA2", "#FFB7B2", "#FFDAC1", "#E2F0CB",
  "#B5EAD7", "#C7CEEA", "#F0E6EF", "#FFE0B2",
  "#D4F0F0", "#FFCCBC", "#E8D1F0", "#FFF9C4"
];

// ====== 转盘 ======
function loadItems() {
  const saved = localStorage.getItem("weekend_wheel_items");
  items = saved ? (() => { try { const p = JSON.parse(saved); return p.length >= 2 ? p : [...DEFAULT_ITEMS]; } catch(e) { return [...DEFAULT_ITEMS]; } })() : [...DEFAULT_ITEMS];
}

function saveItems() {
  localStorage.setItem("weekend_wheel_items", JSON.stringify(items));
}

function renderTagList() {
  document.getElementById("itemList").innerHTML = items.map((item, i) =>
    '<span class="item-tag">' + item +
    (items.length > 2 ? ' <button onclick="removeItem(' + i + ')">×</button>' : '') +
    '</span>'
  ).join("");
}

function addItem() {
  const input = document.getElementById("newItemInput");
  const val = input.value.trim();
  if (!val) return;
  if (items.length >= 12) { alert("最多 12 项哦～"); return; }
  items.push(val);
  saveItems();
  input.value = "";
  renderTagList();
  drawWheel();
}

function removeItem(index) {
  if (items.length <= 2) return;
  items.splice(index, 1);
  saveItems();
  renderTagList();
  drawWheel();
}

document.getElementById("newItemInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") addItem();
});

function drawWheel() {
  const canvas = document.getElementById("wheelCanvas");
  const ctx = canvas.getContext("2d");
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const radius = cx - 8;
  const count = items.length;
  const arc = (2 * Math.PI) / count;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < count; i++) {
    const startAngle = i * arc + wheelAngle;
    const endAngle = startAngle + arc;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.7)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + arc / 2);
    ctx.textAlign = "center";
    ctx.fillStyle = "#4A4A4A";
    ctx.font = "bold 24px 'PingFang SC','Microsoft YaHei',sans-serif";
    ctx.fillText(items[i], radius * 0.6, 8);
    ctx.restore();
  }

  const dotGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 24);
  dotGrad.addColorStop(0, "white");
  dotGrad.addColorStop(1, "#EEE");
  ctx.beginPath();
  ctx.arc(cx, cy, 24, 0, 2 * Math.PI);
  ctx.fillStyle = dotGrad;
  ctx.fill();
  ctx.strokeStyle = "#DDD";
  ctx.lineWidth = 2;
  ctx.stroke();
}

function spin() {
  if (isSpinning) return;
  if (items.length < 2) return;

  isSpinning = true;
  document.getElementById("spinBtn").disabled = true;

  const count = items.length;
  const arc = (2 * Math.PI) / count;
  const targetIndex = Math.floor(Math.random() * count);

  const baseAngle = ((wheelAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  const targetWheelAngle = (((-Math.PI / 2 - targetIndex * arc - arc / 2) % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
  var offset = ((targetWheelAngle - baseAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  const extraSpins = (5 + Math.random() * 5) * 2 * Math.PI;
  const totalRotation = extraSpins + offset;

  const startTime = performance.now();
  const duration = 4000 + Math.random() * 1000;

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 4);
    const angle = totalRotation * eased;
    wheelAngle = (baseAngle + angle) % (2 * Math.PI);
    drawWheel();

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      wheelAngle = (baseAngle + totalRotation) % (2 * Math.PI);
      drawWheel();
      isSpinning = false;
      document.getElementById("spinBtn").disabled = false;

      // 抽到"游戏" → 弹出游戏选择器
      const result = items[targetIndex];
      if (result.includes("游戏") && gameLibrary.length > 0) {
        setTimeout(function() { openGameModal(); }, 600);
      }
    }
  }

  requestAnimationFrame(animate);
}

// ====== Steam 游戏库 ======
let gameLibrary = [];

// 加载保存的 Steam 配置
function loadSteamConfig() {
  const steamId = localStorage.getItem("steam_id") || "";
  const steamKey = localStorage.getItem("steam_key") || "";
  document.getElementById("steamIdInput").value = steamId;
  document.getElementById("steamKeyInput").value = steamKey;
}

function saveSteamConfig() {
  localStorage.setItem("steam_id", document.getElementById("steamIdInput").value.trim());
  localStorage.setItem("steam_key", document.getElementById("steamKeyInput").value.trim());
}

async function syncSteamGames() {
  const btn = document.getElementById("steamSyncBtn");
  const status = document.getElementById("steamStatus");
  const steamId = document.getElementById("steamIdInput").value.trim();
  const steamKey = document.getElementById("steamKeyInput").value.trim();

  if (!steamId || !steamKey) {
    status.textContent = "请填写 Steam ID 和 API Key";
    status.className = "steam-status error";
    return;
  }

  saveSteamConfig();
  btn.disabled = true;
  status.textContent = "正在连接 Steam…";
  status.className = "steam-status loading";

  const apiUrl = "https://api.steampowered.com/IPlayerService/GetOwnedGames/v1/?key=" + steamKey + "&steamid=" + steamId + "&include_appinfo=true&format=json";
  const proxyUrl = "https://corsproxy.io/?url=" + encodeURIComponent(apiUrl);

  try {
    const resp = await fetch(proxyUrl);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();
    if (!data.response || !data.response.games) {
      throw new Error("未找到游戏数据，请确认 Steam ID 正确且资料设为公开");
    }
    const games = data.response.games.map(function(g) { return g.name; });
    gameLibrary = games;
    saveGames();
    renderGameTags();
    status.textContent = "✅ 已同步 " + games.length + " 款游戏";
    status.className = "steam-status success";
  } catch(e) {
    status.textContent = "❌ 同步失败：" + e.message;
    status.className = "steam-status error";
  }

  btn.disabled = false;
}

function loadGames() {
  const saved = localStorage.getItem("steam_game_library");
  gameLibrary = saved ? (() => { try { const p = JSON.parse(saved); return p.length >= 1 ? p : []; } catch(e) { return []; } })() : [];
}

function saveGames() {
  localStorage.setItem("steam_game_library", JSON.stringify(gameLibrary));
}

function renderGameTags() {
  document.getElementById("gameList").innerHTML = gameLibrary.map((g, i) =>
    '<span class="game-tag">🎮 ' + g + ' <button onclick="removeGame(' + i + ')">×</button></span>'
  ).join("") || '<span style="font-size:13px;color:#C0A090;">还没有添加游戏，快把你的 Steam 游戏加进来吧～</span>';
}

function addGame() {
  const input = document.getElementById("newGameInput");
  const val = input.value.trim();
  if (!val) return;
  if (gameLibrary.length >= 50) { alert("最多 50 款游戏哦～"); return; }
  gameLibrary.push(val);
  saveGames();
  input.value = "";
  renderGameTags();
}

function removeGame(index) {
  gameLibrary.splice(index, 1);
  saveGames();
  renderGameTags();
}

document.getElementById("newGameInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") addGame();
});

// ====== 游戏选择弹窗 ======
let gameIsPicking = false;

function openGameModal() {
  document.getElementById("modalOverlay").classList.add("show");
  document.getElementById("gameDisplay").classList.remove("rolling-g");
  document.getElementById("gameEmoji").textContent = "🎲";
  document.getElementById("gameName").textContent = "点击下方按钮";
  document.getElementById("gameName").className = "game-name";
  document.getElementById("gamePickBtn").disabled = false;
  gameIsPicking = false;
}

function closeGameModal() {
  document.getElementById("modalOverlay").classList.remove("show");
}

document.getElementById("modalOverlay").addEventListener("click", function(e) {
  if (e.target === this) closeGameModal();
});

function gamePick() {
  if (gameIsPicking) return;
  if (gameLibrary.length === 0) return;
  gameIsPicking = true;

  const pickBtn = document.getElementById("gamePickBtn");
  const display = document.getElementById("gameDisplay");
  const emojiEl = document.getElementById("gameEmoji");
  const nameEl = document.getElementById("gameName");

  pickBtn.disabled = true;
  display.classList.add("rolling-g");
  nameEl.className = "game-name";

  // 阶段1: 快速滚动 2 秒
  let rollCount = 0;
  const maxRoll = 2000 / 60;

  var rollInterval = setInterval(function() {
    const g = gameLibrary[Math.floor(Math.random() * gameLibrary.length)];
    emojiEl.textContent = GAME_EMOJIS[Math.floor(Math.random() * GAME_EMOJIS.length)];
    nameEl.textContent = g;
    rollCount++;
    if (rollCount >= maxRoll) {
      clearInterval(rollInterval);
      startGameCountdown();
    }
  }, 60);
}

function startGameCountdown() {
  const display = document.getElementById("gameDisplay");
  const emojiEl = document.getElementById("gameEmoji");
  const nameEl = document.getElementById("gameName");
  display.classList.remove("rolling-g");

  var count = 3;
  nameEl.textContent = count;
  nameEl.className = "game-countdown";

  var rollInterval = setInterval(function() {
    const g = gameLibrary[Math.floor(Math.random() * gameLibrary.length)];
    emojiEl.textContent = GAME_EMOJIS[Math.floor(Math.random() * GAME_EMOJIS.length)];
    nameEl.textContent = count;
  }, 180);

  var cdInterval = setInterval(function() {
    count--;
    if (count > 0) {
      nameEl.textContent = count;
    } else {
      clearInterval(cdInterval);
      clearInterval(rollInterval);
      revealGame();
    }
  }, 1000);
}

function revealGame() {
  const pickBtn = document.getElementById("gamePickBtn");
  const emojiEl = document.getElementById("gameEmoji");
  const nameEl = document.getElementById("gameName");
  const final = gameLibrary[Math.floor(Math.random() * gameLibrary.length)];
  emojiEl.textContent = GAME_EMOJIS[Math.floor(Math.random() * GAME_EMOJIS.length)];
  nameEl.textContent = final;
  nameEl.className = "game-name";
  pickBtn.disabled = false;
  gameIsPicking = false;
}

// ====== 初始化 ======
loadItems();
loadGames();
loadSteamConfig();
renderTagList();
renderGameTags();
drawWheel();
</script>
