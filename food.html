<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天吃什么 - 贝宝日常</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #FFF5EE 0%, #FFF0E0 50%, #FFECD2 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
}

.floating-food {
  position: fixed;
  font-size: 32px;
  pointer-events: none;
  z-index: 0;
  opacity: 0.3;
  animation-timing-function: ease-in-out;
  animation-iteration-count: infinite;
}

@keyframes float1 {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(20px, -30px) rotate(10deg); }
  66% { transform: translate(-15px, -15px) rotate(-8deg); }
}

@keyframes float2 {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(-25px, -20px) rotate(-12deg); }
  66% { transform: translate(10px, -35px) rotate(8deg); }
}

@keyframes float3 {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  50% { transform: translate(15px, -40px) rotate(15deg); }
}

.top-bar {
  width: 100%;
  max-width: 480px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  position: relative;
  z-index: 10;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.8);
  border: none;
  color: #E89440;
  font-size: 15px;
  font-weight: 600;
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.back-btn:hover { background: white; transform: scale(1.05); }
.back-btn:active { transform: scale(0.95); }

.page-title {
  font-size: 20px;
  font-weight: 700;
  color: #D48430;
  letter-spacing: 2px;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 480px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 24px 60px;
}

/* ====== 三餐标签 ====== */
.tabs {
  display: flex;
  gap: 0;
  background: white;
  border-radius: 20px;
  padding: 4px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  margin-bottom: 32px;
  width: 100%;
  max-width: 360px;
}

.tab {
  flex: 1;
  padding: 10px 0;
  text-align: center;
  border: none;
  background: transparent;
  border-radius: 16px;
  font-size: 15px;
  font-weight: 600;
  color: #B0A090;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 1px;
}

.tab.active {
  background: linear-gradient(135deg, #FFD93D, #FF8E53);
  color: white;
  box-shadow: 0 2px 8px rgba(255,142,83,0.3);
}

.display-box {
  width: 260px;
  height: 260px;
  background: white;
  border-radius: 30px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.display-box.rolling {
  animation: shake 0.12s ease-in-out infinite;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-3px); }
  75% { transform: translateX(3px); }
}

.display-box.done {
  background: linear-gradient(135deg, #FFF9F0, #FFF3E0);
}

.food-emoji-display {
  font-size: 80px;
  line-height: 1;
  transition: all 0.1s;
}

.food-name-display {
  font-size: 24px;
  font-weight: 700;
  color: #4A4A4A;
  text-align: center;
  padding: 0 8px;
}

.placeholder-text {
  font-size: 16px;
  color: #C0B0B0;
}

/* 店铺提示 */
.shop-hint {
  font-size: 12px;
  color: #C0A080;
  margin-top: 4px;
  max-width: 200px;
  text-align: center;
  line-height: 1.4;
}

.countdown-overlay {
  display: none;
  position: absolute;
  top: 10px;
  right: 10px;
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, #FF6B6B, #FF8E53);
  border-radius: 50%;
  color: white;
  font-size: 28px;
  font-weight: 800;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(255,107,107,0.4);
  animation: pulseCd 0.6s ease-in-out infinite;
  z-index: 5;
}

@keyframes pulseCd {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.12); }
}

.pick-btn {
  margin-top: 32px;
  padding: 16px 60px;
  font-size: 20px;
  font-weight: 700;
  color: white;
  background: linear-gradient(135deg, #FF8E53, #FF6B6B);
  border: none;
  border-radius: 40px;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 6px 24px rgba(255,107,107,0.3);
  letter-spacing: 3px;
}

.pick-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,107,107,0.4); }
.pick-btn:active { transform: scale(0.95); }
.pick-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* 结果烟花 */
.confetti {
  position: fixed;
  font-size: 24px;
  pointer-events: none;
  z-index: 100;
  animation: confettiFall 1.5s ease-out forwards;
}

@keyframes confettiFall {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3); }
}

.meal-label {
  font-size: 13px;
  color: #D48430;
  font-weight: 600;
  letter-spacing: 2px;
  margin-bottom: 16px;
  background: rgba(255,255,255,0.6);
  padding: 4px 16px;
  border-radius: 12px;
}

.footer-hint {
  margin-top: 40px;
  font-size: 13px;
  color: #D0B090;
  letter-spacing: 2px;
}
</style>
</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="window.location.href='index.html'">
    <span>←</span> 返回
  </button>
  <span class="page-title">🍽️ 今天吃什么</span>
</div>

<div class="container">
  <!-- 三餐标签 -->
  <div class="tabs">
    <button class="tab active" id="tabBreakfast" onclick="switchMeal('breakfast')">🌅 早饭</button>
    <button class="tab" id="tabLunch" onclick="switchMeal('lunch')">☀️ 午饭</button>
    <button class="tab" id="tabDinner" onclick="switchMeal('dinner')">🌙 晚饭</button>
  </div>

  <p class="meal-label" id="mealLabel">— 早饭吃啥 —</p>

  <div class="display-box" id="displayBox">
    <span class="food-emoji-display" id="foodEmoji">🤔</span>
    <span class="placeholder-text" id="foodName">点击按钮看看吧～</span>
    <span class="shop-hint" id="shopHint"></span>
    <div class="countdown-overlay" id="countdownOverlay">3</div>
  </div>

  <button class="pick-btn" id="pickBtn" onclick="startPick()">🎲 帮我决定！</button>

  <p class="footer-hint">在金昌也能轻松吃到～</p>
</div>

<script>
var currentMeal = "breakfast";

// ====== 金昌本地美食 ======
// 格式: { name, emoji, shop: "推荐去处" }
var FOODS = {
  breakfast: [
    { name: "牛肉面（毛细）", emoji: "🍜", shop: "各牛肉面馆 · 面条细如发丝" },
    { name: "牛肉面（二细）", emoji: "🍜", shop: "各牛肉面馆 · 经典口感首选" },
    { name: "牛肉面（韭叶）", emoji: "🍜", shop: "各牛肉面馆 · 扁平适口" },
    { name: "牛肉面（大宽）", emoji: "🍜", shop: "各牛肉面馆 · 皮带面口感" },
    { name: "豆浆 + 油条", emoji: "🥛", shop: "各早餐摊 · 随处可见" },
    { name: "豆腐脑", emoji: "🥣", shop: "各早餐摊位" },
    { name: "羊肉泡馍", emoji: "🥘", shop: "羊肉泡馍馆 · 金川区多家" },
    { name: "臊子面", emoji: "🍝", shop: "各面馆均有" },
    { name: "灰豆面", emoji: "🫘", shop: "本地小吃店" },
    { name: "包子（牛肉馅）", emoji: "🥟", shop: "各包子铺" },
    { name: "鸡蛋灌饼", emoji: "🥞", shop: "街边早餐车" },
    { name: "小米粥 + 小菜", emoji: "🥣", shop: "各早餐店" }
  ],
  lunch: [
    { name: "炒面片", emoji: "🍝", shop: "各面馆 · 金昌家常味" },
    { name: "干拌面", emoji: "🍜", shop: "各面馆均有售" },
    { name: "油泼面", emoji: "🍝", shop: "陕西面馆 · 金川区多家" },
    { name: "搓鱼子", emoji: "🐟", shop: "本地特色面馆" },
    { name: "炒拉条", emoji: "🍜", shop: "各清真面馆" },
    { name: "凉皮 + 肉夹馍", emoji: "🥙", shop: "凉皮店 · 各大市场旁" },
    { name: "麻辣粉", emoji: "🌶️", shop: "各麻辣烫/粉店" },
    { name: "盖浇饭（宫保鸡丁）", emoji: "🍛", shop: "各快餐小炒店" },
    { name: "盖浇饭（鱼香肉丝）", emoji: "🍛", shop: "各快餐小炒店" },
    { name: "盖浇饭（土豆烧牛肉）", emoji: "🍛", shop: "各快餐小炒店" },
    { name: "羊肉泡馍", emoji: "🥘", shop: "羊肉泡馍馆" },
    { name: "炒拨拉", emoji: "🥘", shop: "河西特色 · 部分餐馆有" },
    { name: "酸汤面", emoji: "🍜", shop: "各面馆" }
  ],
  dinner: [
    { name: "羊肉垫卷子", emoji: "🥘", shop: "金昌招牌菜 · 多家餐馆" },
    { name: "手抓羊肉", emoji: "🍖", shop: "清真餐馆" },
    { name: "黄焖羊肉", emoji: "🍖", shop: "各中餐馆" },
    { name: "暖锅（甘肃火锅）", emoji: "🍲", shop: "暖锅店 · 金川区有" },
    { name: "大盘鸡", emoji: "🥘", shop: "新疆风味餐馆" },
    { name: "烧烤（羊肉串）", emoji: "🍢", shop: "各烧烤摊 · 夜市" },
    { name: "火锅", emoji: "🍲", shop: "各火锅店" },
    { name: "烤羊排", emoji: "🍖", shop: "清真烧烤店" },
    { name: "干锅", emoji: "🥘", shop: "干锅店" },
    { name: "炒菜米饭（酸辣土豆丝+回锅肉）", emoji: "🥬", shop: "各小炒店" },
    { name: "羊肉汤 + 饼", emoji: "🍲", shop: "羊肉馆" },
    { name: "酸菜鱼", emoji: "🐟", shop: "川菜馆" }
  ]
};

var isPicking = false;
var rollInterval = null;

(function createFloatingFood() {
  var emojis = ["🍜","🥘","🍖","🍝","🥟","🫘","🌶️","🍛","🥙","🍲"];
  for (var i = 0; i < 20; i++) {
    var el = document.createElement("span");
    el.className = "floating-food";
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 100 + "%";
    el.style.top = Math.random() * 100 + "%";
    el.style.animationName = ["float1","float2","float3"][i % 3];
    el.style.animationDuration = (8 + Math.random() * 12) + "s";
    el.style.animationDelay = Math.random() * 10 + "s";
    el.style.fontSize = (24 + Math.random() * 28) + "px";
    document.body.appendChild(el);
  }
})();

function switchMeal(meal) {
  currentMeal = meal;
  document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
  document.getElementById("tab" + meal.charAt(0).toUpperCase() + meal.slice(1)).classList.add("active");
  var labels = { breakfast: "早饭吃啥", lunch: "午饭吃啥", dinner: "晚饭吃啥" };
  var icons = { breakfast: "🌅", lunch: "☀️", dinner: "🌙" };
  document.getElementById("mealLabel").textContent = icons[meal] + " — " + labels[meal] + " —";
  document.getElementById("foodEmoji").textContent = "🤔";
  document.getElementById("foodName").textContent = "点击按钮看看吧～";
  document.getElementById("foodName").className = "placeholder-text";
  document.getElementById("shopHint").textContent = "";
  document.getElementById("displayBox").classList.remove("done", "rolling");
  document.getElementById("countdownOverlay").style.display = "none";
}

function startPick() {
  if (isPicking) return;
  isPicking = true;

  var pickBtn = document.getElementById("pickBtn");
  var displayBox = document.getElementById("displayBox");
  var foodEmoji = document.getElementById("foodEmoji");
  var foodName = document.getElementById("foodName");
  var shopHint = document.getElementById("shopHint");
  var countdownOverlay = document.getElementById("countdownOverlay");
  var list = FOODS[currentMeal];

  pickBtn.disabled = true;
  displayBox.classList.add("rolling");
  displayBox.classList.remove("done");
  foodName.className = "placeholder-text";
  shopHint.textContent = "";
  countdownOverlay.style.display = "none";

  var rollCount = 0;
  var maxRoll = 2000 / 60;

  rollInterval = setInterval(function() {
    var r = list[Math.floor(Math.random() * list.length)];
    foodEmoji.textContent = r.emoji;
    foodName.textContent = r.name;
    rollCount++;
    if (rollCount >= maxRoll) {
      clearInterval(rollInterval);
      startCountdownWithRoll();
    }
  }, 60);
}

function startCountdownWithRoll() {
  var displayBox = document.getElementById("displayBox");
  var foodEmoji = document.getElementById("foodEmoji");
  var foodName = document.getElementById("foodName");
  var countdownOverlay = document.getElementById("countdownOverlay");
  var list = FOODS[currentMeal];

  displayBox.classList.remove("rolling");
  countdownOverlay.style.display = "flex";

  var count = 3;
  countdownOverlay.textContent = count;

  rollInterval = setInterval(function() {
    var r = list[Math.floor(Math.random() * list.length)];
    foodEmoji.textContent = r.emoji;
    foodName.textContent = r.name;
  }, 180);

  var cdInterval = setInterval(function() {
    count--;
    if (count > 0) {
      countdownOverlay.textContent = count;
    } else {
      clearInterval(cdInterval);
      clearInterval(rollInterval);
      countdownOverlay.style.display = "none";
      revealResult();
    }
  }, 1000);
}

function revealResult() {
  var pickBtn = document.getElementById("pickBtn");
  var displayBox = document.getElementById("displayBox");
  var foodEmoji = document.getElementById("foodEmoji");
  var foodName = document.getElementById("foodName");
  var shopHint = document.getElementById("shopHint");
  var list = FOODS[currentMeal];

  var final = list[Math.floor(Math.random() * list.length)];
  foodEmoji.textContent = final.emoji;
  foodName.textContent = final.name;
  foodName.className = "food-name-display";
  shopHint.textContent = final.shop || "";
  displayBox.classList.add("done");

  spawnConfetti();
  pickBtn.disabled = false;
  isPicking = false;
}

function spawnConfetti() {
  var emojis = ["🎉","✨","🌟","💫","🎊","🎀","💖","🌸"];
  var box = document.getElementById("displayBox");
  var rect = box.getBoundingClientRect();
  var cx = rect.left + rect.width / 2;
  var cy = rect.top;

  for (var i = 0; i < 12; i++) {
    var el = document.createElement("span");
    el.className = "confetti";
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = cx + "px";
    el.style.top = cy + "px";
    el.style.setProperty("--dx", (Math.random() - 0.5) * 300 + "px");
    el.style.setProperty("--dy", (Math.random() * 200 + 50) + "px");
    el.style.animationDelay = Math.random() * 0.4 + "s";
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 2000);
  }
}
</script>

</body>
</html>
